name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: file:./data/app.db
          JWT_SECRET: ci-build-secret
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
